services:
  # ═══════════════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════════════

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: locomotive
      POSTGRES_PASSWORD: locomotive_dev_2025
      POSTGRES_DB: locomotive_telemetry
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locomotive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 16
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ═══════════════════════════════════════════════
  # Nginx — reverse proxy & load balancer
  # ═══════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - svc-ingestion-1
      - svc-ingestion-2
      - svc-ingestion-3
      - svc-api-1
      - svc-api-2
      - svc-api-3
      - svc-ws-gateway-1
      - svc-ws-gateway-2
      - svc-ws-gateway-3
      - svc-ws-gateway-4
      - svc-simulator

  # ═══════════════════════════════════════════════
  # svc-ingestion x3 — stateless HTTP telemetry intake
  # ═══════════════════════════════════════════════

  svc-ingestion-1: &ingestion
    build:
      context: ./backend
      dockerfile: svc-ingestion/Dockerfile
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared
      - ./backend/svc-ingestion:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      PYTHONPATH: /app

  svc-ingestion-2:
    <<: *ingestion

  svc-ingestion-3:
    <<: *ingestion

  # ═══════════════════════════════════════════════
  # svc-processor x8 — Kafka consumer group, HI & alerts
  # ═══════════════════════════════════════════════

  svc-processor-1: &processor
    build:
      context: ./backend
      dockerfile: svc-processor/Dockerfile
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared
      - ./backend/svc-processor:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --workers 1
    environment:
      PYTHONPATH: /app

  svc-processor-2:
    <<: *processor

  svc-processor-3:
    <<: *processor

  svc-processor-4:
    <<: *processor

  svc-processor-5:
    <<: *processor

  svc-processor-6:
    <<: *processor

  svc-processor-7:
    <<: *processor

  svc-processor-8:
    <<: *processor

  # ═══════════════════════════════════════════════
  # svc-api x3 — REST API (fleet, history, admin)
  # ═══════════════════════════════════════════════

  svc-api-1: &api
    build:
      context: ./backend
      dockerfile: svc-api/Dockerfile
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared
      - ./backend/svc-api:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    environment:
      PYTHONPATH: /app

  svc-api-2:
    <<: *api

  svc-api-3:
    <<: *api

  # ═══════════════════════════════════════════════
  # svc-ws-gateway x4 — WebSocket fan-out via Redis pub/sub
  # ═══════════════════════════════════════════════

  svc-ws-gateway-1: &ws_gateway
    build:
      context: ./backend
      dockerfile: svc-ws-gateway/Dockerfile
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared
      - ./backend/svc-ws-gateway:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    environment:
      PYTHONPATH: /app

  svc-ws-gateway-2:
    <<: *ws_gateway

  svc-ws-gateway-3:
    <<: *ws_gateway

  svc-ws-gateway-4:
    <<: *ws_gateway

  # ═══════════════════════════════════════════════
  # svc-simulator x1 — telemetry generator
  # ═══════════════════════════════════════════════

  svc-simulator:
    build:
      context: ./backend
      dockerfile: svc-simulator/Dockerfile
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/shared:/app/shared
      - ./backend/svc-simulator:/app/
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload
    environment:
      PYTHONPATH: /app

  # ═══════════════════════════════════════════════
  # Frontend
  # ═══════════════════════════════════════════════

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - nginx
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  pg_data:

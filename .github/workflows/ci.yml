name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Compile backend (monolith)
        run: python -m py_compile backend/app/main.py

      - name: Compile shared package
        run: |
          cd backend
          python -m py_compile shared/config.py
          python -m py_compile shared/auth.py
          python -m py_compile shared/services/database.py
          python -m py_compile shared/services/redis_client.py
          python -m py_compile shared/services/kafka_client.py

      - name: Compile microservices
        run: |
          cd backend
          for svc in svc-ingestion svc-processor svc-api svc-ws-gateway svc-simulator; do
            for f in $svc/*.py; do
              python -m py_compile "$f" && echo "OK: $f"
            done
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Build svc-ingestion
        run: docker build -t lcas-ingestion -f backend/svc-ingestion/Dockerfile backend/

      - name: Build svc-processor
        run: docker build -t lcas-processor -f backend/svc-processor/Dockerfile backend/

      - name: Build svc-api
        run: docker build -t lcas-api -f backend/svc-api/Dockerfile backend/

      - name: Build svc-ws-gateway
        run: docker build -t lcas-ws-gateway -f backend/svc-ws-gateway/Dockerfile backend/

      - name: Build svc-simulator
        run: docker build -t lcas-simulator -f backend/svc-simulator/Dockerfile backend/

      - name: Build frontend
        run: docker build -t lcas-frontend frontend/

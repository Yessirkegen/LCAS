upstream ingestion {
    server svc-ingestion-1:8001;
    server svc-ingestion-2:8001;
    server svc-ingestion-3:8001;
}

upstream api {
    server svc-api-1:8002;
    server svc-api-2:8002;
    server svc-api-3:8002;
}

upstream ws_gateway {
    ip_hash;
    server svc-ws-gateway-1:8003;
    server svc-ws-gateway-2:8003;
    server svc-ws-gateway-3:8003;
    server svc-ws-gateway-4:8003;
}

upstream simulator {
    server svc-simulator:8004;
}

server {
    listen 8000;

    client_max_body_size 10m;

    location /ingest/ {
        proxy_pass http://ingestion;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /ws {
        proxy_pass http://ws_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /simulator/ {
        proxy_pass http://simulator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://api;
        proxy_set_header Host $host;
    }
}
